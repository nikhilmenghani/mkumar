name: Android Build

on:
  push:
    branches:
      - main
    paths:
      - 'release.txt'
    tags-ignore:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Fetch the latest release version
        id: latest_version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .name)
          echo "LATEST_VERSION=$LATEST_VERSION"
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV

      - name: Increment the version
        id: increment_version
        run: |
          LATEST_VERSION=$(echo $LATEST_VERSION | sed 's/v//') # Remove 'v' if present
          echo "LATEST_VERSION=$LATEST_VERSION"
          if [[ "$LATEST_VERSION" == "null" || -z "$LATEST_VERSION" ]]; then
            NEW_VERSION="0.1"
            V_MAJOR=0
            V_MINOR=0
          else
            IFS='.' read -r V_MAJOR V_MINOR <<< "$LATEST_VERSION"
            if [[ -z $V_MAJOR ]]; then
              V_MAJOR=0
            fi
            if [[ $V_MINOR -eq 99 ]]; then
              V_MAJOR=$((V_MAJOR + 1))
              V_MINOR=0
            else
              V_MINOR=$((V_MINOR + 1))
            fi
            NEW_VERSION="$V_MAJOR.$V_MINOR"
          fi
          echo "TAG_VERSION=v$NEW_VERSION" >> $GITHUB_ENV   # Version with 'v' for tagging
          echo "PLAIN_VERSION=$NEW_VERSION" >> $GITHUB_ENV # Version without 'v' for versionName
          echo "V_MAJOR=$V_MAJOR" >> $GITHUB_ENV
          echo "V_MINOR=$V_MINOR" >> $GITHUB_ENV
          echo "VERSION_CODE=$((V_MAJOR * 100 + V_MINOR))" >> $GITHUB_ENV

      - name: Update Version in build.gradle.kts
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ env.PLAIN_VERSION }}\"/" app/build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = $(( ${{ env.V_MAJOR }} * 100 + ${{ env.V_MINOR }} ))/" app/build.gradle.kts

      - name: Set Executable Permission for Gradlew
        run: chmod +x ./gradlew

      - name: Configure release signing key
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [[ -z "$RELEASE_KEYSTORE_BASE64" || -z "$RELEASE_KEYSTORE_PASSWORD" ]]; then
            echo "The KEYSTORE and KEYSTORE_PASSWORD GitHub secrets are required."
            exit 1
          fi

          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mkumar-release.keystore"
          KEY_ALIAS=$(keytool -list -v \
            -keystore "$RUNNER_TEMP/mkumar-release.keystore" \
            -storepass "$RELEASE_KEYSTORE_PASSWORD" | \
            sed -n 's/^Alias name: //p' | head -n 1)

          if [[ -z "$KEY_ALIAS" ]]; then
            echo "Could not determine the signing-key alias from KEYSTORE."
            exit 1
          fi

          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/mkumar-release.keystore" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"

      - name: Build and Sign APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: List APK directory
        run: |
          ls -lR app/build/outputs/apk/release

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/MKumar-${{ env.TAG_VERSION }}.apk

      - name: Create Release with Files
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/MKumar-${{ env.TAG_VERSION }}.apk
          tag_name: ${{ env.TAG_VERSION }}
          name: ${{ env.TAG_VERSION }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.AUTH }}
